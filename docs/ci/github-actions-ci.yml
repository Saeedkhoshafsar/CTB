name: CI

on:
  push:
    branches: [main, genspark_ai_developer]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Verify (typecheck + tests)
        run: npm run verify

      - name: DB migration smoke test
        run: CTB_SECRET=cisecret01234567 CTB_DB_PATH=/tmp/ctb-ci.sqlite npm run db:migrate

      - name: Editor build
        run: npm run build -w apps/editor

# NOTE: the sandbox's GitHub App token lacks `workflows` permission, so this file
# lives in docs/ci/. To enable CI, copy it manually to .github/workflows/ci.yml:
#   mkdir -p .github/workflows && cp docs/ci/github-actions-ci.yml .github/workflows/ci.yml
