# Build the CTB Docker image and publish it to the GitHub Container Registry
# (ghcr.io) so you can deploy it on Coolify as a ready-made "Docker Image"
# without building anything yourself.
#
# It runs:
#   • on every push to `main`            → tags `:main` and `:latest`
#   • on every Git tag like `v1.2.3`     → tags `:1.2.3`, `:1.2`, `:latest`
#   • on every published GitHub Release  → same as the tag above
#   • manually from the Actions tab      → tag `:main`
#
# The resulting image lives at:
#   ghcr.io/<your-github-user-or-org>/ctb:latest   (lowercased automatically)
#
# In Coolify: New Resource → Docker Image →
#   Image = ghcr.io/saeedkhoshafsar/ctb   Tag = latest
# (If the package is private, add a GHCR Source/credential in Coolify first.)

name: Build & publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name = <owner>/ctb  (e.g. saeedkhoshafsar/ctb). docker/metadata-action
  # lowercases the owner automatically so it's always a valid image reference.
  IMAGE_NAME: ${{ github.repository_owner }}/ctb

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io with the built-in GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
